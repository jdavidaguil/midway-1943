<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midway 1943: Pacific Inferno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #gameCanvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #334;
      display: block;
    }
    #ui {
      color: #0ff;
      font-size: 13px;
      letter-spacing: 2px;
      margin-top: 6px;
      text-align: center;
      text-shadow: 0 0 6px #0ff;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="320" height="480"></canvas>
<div id="ui">ARROWS/WASD=MOVE &nbsp; SPACE=PAUSE &nbsp; ENTER=START</div>

<script>
'use strict';

// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const W = 320, H = 480;
const SPRITE_W = 32, SPRITE_H = 32;
const SHEET_COLS = 8;   // sprites per row (will be confirmed after load)

// Sprite-sheet row/col indices  (col, row) zero-based
// Layout assumption for a classic 1943-style 256×256 or similar sheet:
//   Row 0: player plane variants / explosions start
//   Row 1: enemy small planes
//   Row 2: enemy medium planes
//   Row 3: enemy large planes / battleships
//   Row 4: boats / misc enemies
//   Row 5: bullets / projectiles
//   Row 6: power-ups (P, POW, FUEL)
//   Row 7: explosion frames
//
// These will be auto-detected; if sheet is empty/invalid, procedural sprites are used.

const SPRITES = {
  PLAYER:        { col: 0, row: 0 },
  PLAYER_SHIELD: { col: 1, row: 0 },
  EXP0:          { col: 0, row: 7 },
  EXP1:          { col: 1, row: 7 },
  EXP2:          { col: 2, row: 7 },
  EXP3:          { col: 3, row: 7 },
  EXP4:          { col: 4, row: 7 },
  ENEMY_SMALL:   { col: 0, row: 1 },
  ENEMY_MED:     { col: 0, row: 2 },
  ENEMY_LARGE:   { col: 0, row: 3 },
  ENEMY_SHIP:    { col: 0, row: 4 },
  ENEMY_BOAT:    { col: 4, row: 4 },
  BULLET_PLAYER: { col: 0, row: 5 },
  BULLET_ENEMY:  { col: 2, row: 5 },
  PU_P:          { col: 0, row: 6 },
  PU_POW:        { col: 2, row: 6 },
  PU_FUEL:       { col: 4, row: 6 },
};

// ─────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ─────────────────────────────────────────────
//  PROCEDURAL SPRITE PAINTER
//  Used when sprite sheet pixel data is absent.
// ─────────────────────────────────────────────
function buildProceduralSheet() {
  const cols = 8, rows = 8;
  const sc = document.createElement('canvas');
  sc.width  = cols * SPRITE_W;
  sc.height = rows * SPRITE_H;
  const sx = sc.getContext('2d');
  sx.imageSmoothingEnabled = false;

  function cell(col, row) {
    return { x: col * SPRITE_W, y: row * SPRITE_H };
  }

  // Helper: draw pixel-art shape
  function drawShape(col, row, drawFn) {
    const {x, y} = cell(col, row);
    sx.save();
    sx.translate(x, y);
    drawFn(sx);
    sx.restore();
  }

  // ── Player plane (row 0, col 0) – blue/white
  drawShape(0, 0, (g) => {
    // Body
    g.fillStyle = '#4af';
    g.fillRect(13,  2, 6, 20);
    // Wings
    g.fillStyle = '#28d';
    g.fillRect(4,  10, 24, 6);
    // Nose
    g.fillStyle = '#fff';
    g.fillRect(14,  0, 4, 4);
    // Cockpit
    g.fillStyle = '#8ef';
    g.fillRect(14, 6, 4, 6);
    // Tail fins
    g.fillStyle = '#28d';
    g.fillRect(8,  18, 5, 4);
    g.fillRect(19, 18, 5, 4);
    // Engine glow
    g.fillStyle = '#ff6';
    g.fillRect(14, 22, 4, 6);
  });

  // ── Player shield variant (row 0, col 1) – same + orange outline
  drawShape(1, 0, (g) => {
    g.fillStyle = '#4af';
    g.fillRect(13, 2, 6, 20);
    g.fillStyle = '#28d';
    g.fillRect(4, 10, 24, 6);
    g.fillStyle = '#fff'; g.fillRect(14, 0, 4, 4);
    g.fillStyle = '#8ef'; g.fillRect(14, 6, 4, 6);
    g.fillStyle = '#28d'; g.fillRect(8, 18, 5, 4); g.fillRect(19, 18, 5, 4);
    g.fillStyle = '#ff6'; g.fillRect(14, 22, 4, 6);
    g.strokeStyle = '#f80'; g.lineWidth = 2;
    g.strokeRect(1, 1, 30, 30);
  });

  // ── Enemy small plane (row 1, col 0) – green
  drawShape(0, 1, (g) => {
    g.fillStyle = '#4c4';
    g.fillRect(13, 6, 6, 18);
    g.fillStyle = '#282';
    g.fillRect(6, 14, 20, 5);
    g.fillStyle = '#8f8';
    g.fillRect(14, 8, 4, 6);
    g.fillStyle = '#6f6';
    g.fillRect(9, 22, 4, 4); g.fillRect(19, 22, 4, 4);
    g.fillStyle = '#600';
    g.fillRect(14, 4, 4, 4);
  });

  // ── Enemy medium plane (row 2, col 0) – dark green
  drawShape(0, 2, (g) => {
    g.fillStyle = '#393';
    g.fillRect(12, 4, 8, 24);
    g.fillStyle = '#1a1';
    g.fillRect(4, 12, 24, 7);
    g.fillStyle = '#6f6';
    g.fillRect(13, 6, 6, 7);
    g.fillStyle = '#393'; g.fillRect(7, 22, 6, 5); g.fillRect(19, 22, 6, 5);
    g.fillStyle = '#a22'; g.fillRect(13, 2, 6, 4);
  });

  // ── Enemy large plane (row 3, col 0) – grey-green bomber
  drawShape(0, 3, (g) => {
    g.fillStyle = '#556644';
    g.fillRect(10, 2, 12, 28);
    g.fillStyle = '#445533';
    g.fillRect(2, 10, 28, 10);
    g.fillStyle = '#778866';
    g.fillRect(12, 4, 8, 8);
    g.fillRect(3, 11, 6, 7); g.fillRect(23, 11, 6, 7);
    g.fillStyle = '#a33'; g.fillRect(12, 0, 8, 4);
    g.fillStyle = '#ff8'; g.fillRect(13, 26, 6, 4);
  });

  // ── Battleship (row 4, col 0) – grey, 48px tall using 32px cell approximation
  drawShape(0, 4, (g) => {
    // Use the 32×32 cell, draw a compact ship
    g.fillStyle = '#667';
    g.fillRect(6, 1, 20, 30);
    g.fillStyle = '#889';
    g.fillRect(8, 3, 16, 4);   // deck
    g.fillRect(10, 7, 12, 4);  // superstructure
    g.fillRect(12, 11, 8, 6);  // tower
    g.fillStyle = '#aab';
    g.fillRect(13, 8, 6, 4);
    // Gun barrels
    g.fillStyle = '#334';
    g.fillRect(11, 5, 3, 3); g.fillRect(18, 5, 3, 3);
    g.fillRect(8, 14, 3, 2); g.fillRect(21, 14, 3, 2);
    // Wake
    g.fillStyle = '#adf';
    g.fillRect(4, 26, 4, 4); g.fillRect(24, 26, 4, 4);
  });

  // ── Boat (row 4, col 4) – small brown boat
  drawShape(4, 4, (g) => {
    g.fillStyle = '#964';
    g.fillRect(8, 12, 16, 10);
    g.fillStyle = '#b86';
    g.fillRect(10, 9, 12, 5);
    g.fillStyle = '#753';
    g.fillRect(14, 6, 4, 4);
    g.fillStyle = '#adf';
    g.fillRect(4, 20, 6, 3); g.fillRect(22, 20, 6, 3);
  });

  // ── Player bullet (row 5, col 0) – bright yellow vertical
  drawShape(0, 5, (g) => {
    g.fillStyle = '#ff0';
    g.fillRect(14, 2, 4, 14);
    g.fillStyle = '#fff';
    g.fillRect(15, 2, 2, 4);
  });

  // ── Enemy bullet (row 5, col 2) – red
  drawShape(2, 5, (g) => {
    g.fillStyle = '#f44';
    g.fillRect(14, 6, 4, 16);
    g.fillStyle = '#f88';
    g.fillRect(15, 8, 2, 4);
  });

  // ── Power-up P (row 6, col 0) – cyan
  drawShape(0, 6, (g) => {
    g.fillStyle = '#0cc';
    g.fillRect(4, 4, 24, 24);
    g.fillStyle = '#000';
    g.font = 'bold 18px monospace';
    g.fillText('P', 10, 23);
  });

  // ── Power-up POW (row 6, col 2) – orange
  drawShape(2, 6, (g) => {
    g.fillStyle = '#f80';
    g.fillRect(4, 4, 24, 24);
    g.fillStyle = '#000';
    g.font = 'bold 9px monospace';
    g.fillText('POW', 5, 19);
  });

  // ── Power-up FUEL (row 6, col 4) – green
  drawShape(4, 6, (g) => {
    g.fillStyle = '#0a0';
    g.fillRect(4, 4, 24, 24);
    g.fillStyle = '#fff';
    g.font = 'bold 8px monospace';
    g.fillText('FUEL', 4, 19);
  });

  // ── Explosion frames (row 7, cols 0-4)
  const expColors = [
    ['#ff0','#f80'],
    ['#f80','#f40'],
    ['#f40','#f00'],
    ['#f00','#800'],
    ['#800','#400'],
  ];
  for (let i = 0; i < 5; i++) {
    drawShape(i, 7, (g) => {
      const [c1, c2] = expColors[i];
      const r = 4 + i * 2;
      const cx_ = 16, cy_ = 16;
      // Outer bloom
      g.fillStyle = c2;
      g.beginPath();
      g.arc(cx_, cy_, r + 4, 0, Math.PI * 2);
      g.fill();
      // Inner fire
      g.fillStyle = c1;
      g.beginPath();
      g.arc(cx_, cy_, r, 0, Math.PI * 2);
      g.fill();
      // Sparks
      g.fillStyle = '#fff';
      const sparks = [[cx_-r-2, cy_],[cx_+r+2, cy_],[cx_, cy_-r-2],[cx_, cy_+r+2]];
      for (const [sx_, sy_] of sparks) {
        g.fillRect(sx_-1, sy_-1, 3, 3);
      }
    });
  }

  return sc;
}

// ─────────────────────────────────────────────
//  SPRITE UTILITIES
// ─────────────────────────────────────────────
let sheet = null;
let sheetCols = SHEET_COLS;
let sheetRows = 8;

function getSprite(key) {
  const def = SPRITES[key];
  if (!def) return null;
  return { sx: def.col * SPRITE_W, sy: def.row * SPRITE_H, sw: SPRITE_W, sh: SPRITE_H };
}

function drawSprite(key, dx, dy, flipX = false, scaleX = 1, scaleY = 1) {
  const sp = getSprite(key);
  if (!sp || !sheet) return;
  ctx.save();
  ctx.translate(dx + (flipX ? SPRITE_W * scaleX : 0), dy);
  if (flipX) ctx.scale(-1, 1);
  ctx.drawImage(sheet, sp.sx, sp.sy, sp.sw, sp.sh, 0, 0, SPRITE_W * scaleX, SPRITE_H * scaleY);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  OCEAN BACKGROUND SCROLLER
// ─────────────────────────────────────────────
const bgCanvas = document.createElement('canvas');
bgCanvas.width = W; bgCanvas.height = H * 2;
(function buildOcean() {
  const bg = bgCanvas.getContext('2d');
  bg.imageSmoothingEnabled = false;
  // Deep ocean gradient
  const grad = bg.createLinearGradient(0, 0, 0, H * 2);
  grad.addColorStop(0,   '#001428');
  grad.addColorStop(0.5, '#002040');
  grad.addColorStop(1,   '#001428');
  bg.fillStyle = grad;
  bg.fillRect(0, 0, W, H * 2);

  // Wave lines
  bg.strokeStyle = 'rgba(0,150,255,0.18)';
  bg.lineWidth = 1;
  for (let y = 0; y < H * 2; y += 8) {
    bg.beginPath();
    for (let x = 0; x < W; x += 4) {
      const wave = Math.sin((x + y) * 0.08) * 2;
      if (x === 0) bg.moveTo(x, y + wave);
      else bg.lineTo(x, y + wave);
    }
    bg.stroke();
  }

  // Foam patches
  bg.fillStyle = 'rgba(180,220,255,0.09)';
  const rng = mulberry32(0xdeadbeef);
  for (let i = 0; i < 120; i++) {
    const fx = rng() * W;
    const fy = rng() * H * 2;
    const fw = 12 + rng() * 30;
    const fh = 3 + rng() * 6;
    bg.fillRect(fx, fy, fw, fh);
  }

  // Islands (rare, dark blobs)
  bg.fillStyle = '#1a2a10';
  for (let i = 0; i < 6; i++) {
    const ix = 20 + rng() * (W - 40);
    const iy = rng() * H * 2;
    const ir = 10 + rng() * 20;
    bg.beginPath();
    bg.ellipse(ix, iy, ir, ir * 0.5, 0, 0, Math.PI * 2);
    bg.fill();
    bg.fillStyle = '#2a3a18';
    bg.beginPath();
    bg.ellipse(ix - 2, iy - 2, ir * 0.6, ir * 0.3, 0, 0, Math.PI * 2);
    bg.fill();
    bg.fillStyle = '#1a2a10';
  }
})();

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

let bgY = 0;
function scrollOcean(dt) {
  bgY += 60 * dt;
  if (bgY >= H) bgY -= H;
}
function drawOcean() {
  const y0 = Math.floor(bgY);
  ctx.drawImage(bgCanvas, 0, H - y0,  W, H, 0, 0,  W, H);
  if (y0 > 0) {
    ctx.drawImage(bgCanvas, 0, H - y0 - H, W, H, 0, 0, W, H);
  }
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─────────────────────────────────────────────
//  SOUND (procedural beeps via Web Audio)
// ─────────────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(freq, type, duration, vol = 0.18, startDelay = 0) {
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime + startDelay);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startDelay + duration);
    osc.start(audioCtx.currentTime + startDelay);
    osc.stop(audioCtx.currentTime + startDelay + duration);
  } catch(e) { /* audio not supported */ }
}
function sfxShoot()     { beep(880, 'square', 0.07, 0.12); }
function sfxExplode()   { beep(120, 'sawtooth', 0.25, 0.22); beep(80,'noise'?'square':'square', 0.3, 0.12, 0.05); }
function sfxPowerup()   { beep(660,'square',0.1,0.18); beep(880,'square',0.1,0.18,0.12); beep(1100,'square',0.15,0.2,0.24); }
function sfxBomb()      { for(let i=0;i<8;i++) beep(200-i*20,'sawtooth',0.15+i*0.03,0.2,i*0.06); }
function sfxHit()       { beep(220,'square',0.1,0.15); }

// ─────────────────────────────────────────────
//  PARTICLE SYSTEM
// ─────────────────────────────────────────────
const particles = [];
function spawnParticle(x, y, vx, vy, life, color, size) {
  particles.push({ x, y, vx, vy, life, maxLife: life, color, size });
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x - p.size/2), Math.round(p.y - p.size/2), p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ─────────────────────────────────────────────
//  EXPLOSION CLASS
// ─────────────────────────────────────────────
const explosions = [];
function spawnExplosion(x, y, size = 1) {
  explosions.push({ x, y, frame: 0, timer: 0, frameDur: 0.07, size });
  sfxExplode();
  for (let i = 0; i < 8 + size * 4; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 80 * size;
    spawnParticle(x, y,
      Math.cos(angle) * speed, Math.sin(angle) * speed,
      0.4 + Math.random() * 0.4,
      ['#ff0','#f80','#f40','#fff'][Math.floor(Math.random()*4)],
      size + Math.floor(Math.random() * 2));
  }
}
function updateExplosions(dt) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.timer += dt;
    if (e.timer >= e.frameDur) {
      e.frame++;
      e.timer = 0;
      if (e.frame >= 5) explosions.splice(i, 1);
    }
  }
}
function drawExplosions() {
  for (const e of explosions) {
    const key = `EXP${e.frame}`;
    const sc = e.size * SPRITE_W;
    drawSprite(key, e.x - sc/2, e.y - sc/2, false, e.size, e.size);
  }
}

// ─────────────────────────────────────────────
//  BULLET CLASS
// ─────────────────────────────────────────────
const bullets = [];
function spawnBullet(x, y, vy, owner, vx = 0) {
  bullets.push({ x, y, vx, vy, owner, w: 4, h: 10, active: true });
}
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20 || !b.active) {
      bullets.splice(i, 1);
    }
  }
}
function drawBullets() {
  for (const b of bullets) {
    if (b.owner === 'player') {
      drawSprite('BULLET_PLAYER', b.x - 2, b.y - 5);
    } else {
      drawSprite('BULLET_ENEMY', b.x - 2, b.y - 5);
    }
  }
}

// ─────────────────────────────────────────────
//  POWER-UP CLASS
// ─────────────────────────────────────────────
const powerups = [];
const PU_TYPES = ['P', 'POW', 'FUEL'];
function spawnPowerup(x, y) {
  const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
  powerups.push({ x, y, type, vy: 40, w: SPRITE_W, h: SPRITE_H, active: true });
}
function updatePowerups(dt) {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy * dt;
    if (p.y > H + 40 || !p.active) powerups.splice(i, 1);
  }
}
function drawPowerups() {
  for (const p of powerups) {
    const key = { P: 'PU_P', POW: 'PU_POW', FUEL: 'PU_FUEL' }[p.type];
    drawSprite(key, p.x - 16, p.y - 16);
  }
}

// ─────────────────────────────────────────────
//  ENEMY CLASSES
// ─────────────────────────────────────────────
const enemies = [];

const ENEMY_DEFS = {
  small: {
    key: 'ENEMY_SMALL', w: 28, h: 28,
    hp: 1, speed: 90, score: 100,
    shootRate: 0, bulletSpeed: 160,
    size: 1,
  },
  medium: {
    key: 'ENEMY_MED', w: 30, h: 30,
    hp: 3, speed: 60, score: 250,
    shootRate: 1.4, bulletSpeed: 140,
    size: 1,
  },
  large: {
    key: 'ENEMY_LARGE', w: 32, h: 32,
    hp: 8, speed: 40, score: 500,
    shootRate: 0.8, bulletSpeed: 120,
    size: 1,
  },
  ship: {
    key: 'ENEMY_SHIP', w: 48, h: 48,
    hp: 20, speed: 20, score: 1000,
    shootRate: 0.5, bulletSpeed: 100,
    size: 1.5,
  },
  boat: {
    key: 'ENEMY_BOAT', w: 28, h: 28,
    hp: 2, speed: 75, score: 150,
    shootRate: 0.6, bulletSpeed: 130,
    size: 1,
  },
};

function spawnEnemy(type, x, y, wave) {
  const def = ENEMY_DEFS[type];
  const scaledHp = def.hp + Math.floor(wave * 0.5);
  enemies.push({
    type,
    key: def.key,
    x, y,
    vx: (Math.random() - 0.5) * 30,
    vy: def.speed * (0.8 + Math.random() * 0.4),
    w: def.w, h: def.h,
    hp: scaledHp, maxHp: scaledHp,
    score: def.score,
    shootRate: def.shootRate,
    shootTimer: Math.random() * def.shootRate,
    bulletSpeed: def.bulletSpeed,
    active: true,
    size: def.size,
    flashTimer: 0,
    wave,
  });
}

function updateEnemies(dt, player) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.flashTimer -= dt;

    // Bounce horizontally for planes
    if (e.type !== 'ship' && e.type !== 'boat') {
      if (e.x < 10 || e.x > W - 10) e.vx *= -1;
    }

    // Shooting
    if (e.shootRate > 0 && player.active) {
      e.shootTimer -= dt;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.shootRate * (0.7 + Math.random() * 0.6);
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        spawnBullet(e.x, e.y + e.h/2,
          (dy / dist) * e.bulletSpeed,
          'enemy',
          (dx / dist) * e.bulletSpeed * 0.4);
      }
    }

    if (e.y > H + 60 || !e.active) {
      if (!e.active) { /* handled below */ }
      enemies.splice(i, 1);
    }
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.flashTimer > 0) {
      ctx.globalAlpha = 0.5 + 0.5 * Math.abs(Math.sin(e.flashTimer * 40));
    }
    const sc = e.size;
    drawSprite(e.key, e.x - (SPRITE_W * sc)/2, e.y - (SPRITE_H * sc)/2, false, sc, sc);
    ctx.globalAlpha = 1;

    // Health bar for tougher enemies
    if (e.maxHp > 2) {
      const bw = SPRITE_W * sc;
      const bx = e.x - bw/2;
      const by = e.y - SPRITE_H * sc / 2 - 6;
      ctx.fillStyle = '#400';
      ctx.fillRect(bx, by, bw, 3);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), 3);
    }
  }
}

// ─────────────────────────────────────────────
//  PLAYER
// ─────────────────────────────────────────────
const player = {
  x: W / 2, y: H - 80,
  w: 28, h: 28,
  speed: 160,
  active: true,
  hp: 3, maxHp: 3,
  firepower: 1,
  shootTimer: 0,
  shootRate: 0.18,
  fuel: 100, maxFuel: 100,
  fuelDrainRate: 2.5,
  invincible: 0,
  flashTimer: 0,
  score: 0,
  lives: 3,
  dead: false,
  deathTimer: 0,
};

function resetPlayer() {
  player.x = W / 2; player.y = H - 80;
  player.hp = player.maxHp;
  player.fuel = 100;
  player.firepower = 1;
  player.active = true;
  player.invincible = 2.0;
}

function updatePlayer(dt) {
  if (!player.active) {
    player.deathTimer -= dt;
    if (player.deathTimer <= 0) {
      if (player.lives > 0) {
        player.lives--;
        resetPlayer();
      } else {
        gameState = 'gameover';
      }
    }
    return;
  }

  player.invincible -= dt;
  player.flashTimer -= dt;

  // Movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }

  player.x += dx * player.speed * dt;
  player.y += dy * player.speed * dt;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
  player.y = Math.max(player.h/2, Math.min(H - player.h/2, player.y));

  // Fuel drain
  player.fuel -= player.fuelDrainRate * dt;
  if (player.fuel <= 0) {
    player.fuel = 0;
    // Slow down and take damage over time when out of fuel
    player.speed = 80;
  } else {
    player.speed = 160;
  }

  // Auto-shoot
  player.shootTimer -= dt;
  if (player.shootTimer <= 0) {
    playerShoot();
    player.shootTimer = player.shootRate;
  }
}

function playerShoot() {
  sfxShoot();
  if (player.firepower === 1) {
    spawnBullet(player.x, player.y - 16, -500, 'player');
  } else if (player.firepower === 2) {
    spawnBullet(player.x - 8, player.y - 12, -500, 'player');
    spawnBullet(player.x + 8, player.y - 12, -500, 'player');
  } else if (player.firepower >= 3) {
    spawnBullet(player.x,     player.y - 16, -520, 'player');
    spawnBullet(player.x - 10, player.y - 12, -500, 'player', -30);
    spawnBullet(player.x + 10, player.y - 12, -500, 'player',  30);
  }
}

function playerBomb() {
  // POW: clears all enemies
  sfxBomb();
  for (const e of enemies) {
    player.score += e.score;
    spawnExplosion(e.x, e.y, e.size || 1);
    e.active = false;
  }
  enemies.length = 0;
  for (const b of bullets) {
    if (b.owner === 'enemy') b.active = false;
  }
  // Screen flash
  screenFlash(0.6, '#ff8800');
}

function drawPlayer() {
  if (!player.active) return;
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;
  const key = player.invincible > 1.5 ? 'PLAYER_SHIELD' : 'PLAYER';
  drawSprite(key, player.x - 16, player.y - 16);
}

// ─────────────────────────────────────────────
//  SCREEN FLASH
// ─────────────────────────────────────────────
let flashAlpha = 0, flashColor = '#fff';
function screenFlash(alpha, color = '#fff') {
  flashAlpha = alpha;
  flashColor = color;
}

// ─────────────────────────────────────────────
//  COLLISION DETECTION
// ─────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 &&
         ax + aw/2 > bx - bw/2 &&
         ay - ah/2 < by + bh/2 &&
         ay + ah/2 > by - bh/2;
}

function checkCollisions() {
  // Player bullets vs enemies
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (b.owner !== 'player') continue;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (rectsOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
        b.active = false;
        e.hp--;
        e.flashTimer = 0.12;
        sfxHit();
        if (e.hp <= 0) {
          player.score += e.score;
          spawnExplosion(e.x, e.y, e.size || 1);
          if (Math.random() < 0.12) spawnPowerup(e.x, e.y);
          e.active = false;
          enemies.splice(ei, 1);
        }
        break;
      }
    }
  }

  // Enemy bullets vs player
  if (player.active && player.invincible <= 0) {
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      if (b.owner !== 'enemy') continue;
      if (rectsOverlap(b.x, b.y, b.w, b.h, player.x, player.y, player.w, player.h)) {
        b.active = false;
        playerHit();
        break;
      }
    }
  }

  // Enemies vs player (collision)
  if (player.active && player.invincible <= 0) {
    for (const e of enemies) {
      if (rectsOverlap(e.x, e.y, e.w, e.h, player.x, player.y, player.w, player.h)) {
        playerHit();
        break;
      }
    }
  }

  // Player vs power-ups
  for (let pi = powerups.length - 1; pi >= 0; pi--) {
    const p = powerups[pi];
    if (rectsOverlap(p.x, p.y, p.w, p.h, player.x, player.y, player.w, player.h)) {
      applyPowerup(p.type);
      p.active = false;
      powerups.splice(pi, 1);
    }
  }
}

function playerHit() {
  player.hp--;
  player.invincible = 1.5;
  sfxExplode();
  screenFlash(0.5);
  spawnExplosion(player.x, player.y, 1);
  if (player.hp <= 0) {
    player.active = false;
    player.deathTimer = 1.5;
    spawnExplosion(player.x, player.y, 2);
  }
}

function applyPowerup(type) {
  sfxPowerup();
  if (type === 'P') {
    player.firepower = Math.min(3, player.firepower + 1);
  } else if (type === 'POW') {
    playerBomb();
  } else if (type === 'FUEL') {
    player.fuel = Math.min(player.maxFuel, player.fuel + 50);
  }
  screenFlash(0.3, '#00ffaa');
}

// ─────────────────────────────────────────────
//  WAVE / DIFFICULTY MANAGER
// ─────────────────────────────────────────────
let wave = 1;
let waveTimer = 0;
let spawnTimer = 0;
let spawnRate = 2.0;
let totalTime = 0;

function updateWave(dt) {
  totalTime += dt;
  waveTimer += dt;

  // New wave every 30 seconds
  if (waveTimer > 30) {
    wave++;
    waveTimer = 0;
    spawnRate = Math.max(0.5, 2.0 - wave * 0.15);
    screenFlash(0.4, '#002244');
  }

  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnEnemy_(wave);
    spawnTimer = spawnRate * (0.6 + Math.random() * 0.8);
  }
}

function spawnEnemy_(wave) {
  const x = 20 + Math.random() * (W - 40);
  const y = -40;
  const r = Math.random();
  let type;
  if (wave <= 1) {
    type = r < 0.7 ? 'small' : 'boat';
  } else if (wave <= 3) {
    type = r < 0.4 ? 'small' : r < 0.75 ? 'medium' : r < 0.9 ? 'boat' : 'large';
  } else if (wave <= 5) {
    type = r < 0.25 ? 'small' : r < 0.55 ? 'medium' : r < 0.75 ? 'large' : r < 0.92 ? 'boat' : 'ship';
  } else {
    type = r < 0.15 ? 'small' : r < 0.4 ? 'medium' : r < 0.6 ? 'large' : r < 0.78 ? 'boat' : 'ship';
  }

  // Formation spawning every few waves
  if (wave > 2 && Math.random() < 0.25) {
    const count = 3 + Math.floor(Math.random() * 3);
    const ft = type === 'ship' ? 'small' : type;
    for (let i = 0; i < count; i++) {
      spawnEnemy(ft, 20 + (i + 1) * (W / (count + 1)), y - i * 20, wave);
    }
  } else {
    spawnEnemy(type, x, y, wave);
  }
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
function drawHUD() {
  // Score
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 10px "Courier New"';
  ctx.fillText(`SCORE: ${player.score}`, 4, 12);

  // Wave
  ctx.fillStyle = '#ff8';
  ctx.fillText(`WAVE: ${wave}`, W - 60, 12);

  // Lives
  ctx.fillStyle = '#fff';
  ctx.fillText('LIVES:', 4, 26);
  for (let i = 0; i < player.lives; i++) {
    drawSprite('PLAYER', 40 + i * 18, 16, false, 0.5, 0.5);
  }

  // Fuel bar
  const fuelW = 80;
  const fuelX = W - fuelW - 4;
  const fuelY = 20;
  ctx.fillStyle = '#333';
  ctx.fillRect(fuelX, fuelY, fuelW, 6);
  const fuelPct = player.fuel / player.maxFuel;
  ctx.fillStyle = fuelPct > 0.4 ? '#0f0' : fuelPct > 0.2 ? '#ff0' : '#f00';
  ctx.fillRect(fuelX, fuelY, fuelW * fuelPct, 6);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(fuelX, fuelY, fuelW, 6);
  ctx.fillStyle = '#aaa';
  ctx.font = '8px "Courier New"';
  ctx.fillText('FUEL', fuelX - 22, fuelY + 6);

  // HP hearts
  ctx.fillStyle = '#f44';
  ctx.font = '10px "Courier New"';
  ctx.fillText('HP:', 4, 40);
  for (let i = 0; i < player.maxHp; i++) {
    ctx.fillStyle = i < player.hp ? '#f44' : '#333';
    ctx.fillRect(24 + i * 10, 31, 8, 8);
  }

  // Firepower
  ctx.fillStyle = '#ff0';
  ctx.font = '8px "Courier New"';
  ctx.fillText(`POW: ${'★'.repeat(player.firepower)}`, 4, H - 4);
}

// ─────────────────────────────────────────────
//  SCREENS
// ─────────────────────────────────────────────
function drawTitleScreen() {
  drawOcean();

  // Dim overlay
  ctx.fillStyle = 'rgba(0,5,20,0.7)';
  ctx.fillRect(0, 0, W, H);

  // Title box
  ctx.strokeStyle = '#0af';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 30, W - 20, 100);
  ctx.fillStyle = 'rgba(0,10,30,0.85)';
  ctx.fillRect(11, 31, W - 22, 98);

  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 14px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('MIDWAY 1943', W/2, 62);
  ctx.fillStyle = '#f80';
  ctx.font = 'bold 10px "Courier New"';
  ctx.fillText('PACIFIC INFERNO', W/2, 80);
  ctx.fillStyle = '#0ff';
  ctx.font = '8px "Courier New"';
  ctx.fillText('A retro vertical shooter', W/2, 98);
  ctx.fillText('inspired by 1943: The Battle of Midway', W/2, 112);

  ctx.fillStyle = Math.floor(Date.now() / 500) % 2 ? '#fff' : '#0ff';
  ctx.font = 'bold 10px "Courier New"';
  ctx.fillText('PRESS ENTER TO START', W/2, 165);

  ctx.fillStyle = '#888';
  ctx.font = '8px "Courier New"';
  ctx.fillText('ARROWS/WASD = MOVE', W/2, 220);
  ctx.fillText('AUTO FIRE   SPACE = PAUSE', W/2, 234);
  ctx.fillText('COLLECT P=FIREPOWER POW=BOMB FUEL=FUEL', W/2, 248);

  // Demo plane
  const t = Date.now() / 1000;
  const px = W/2 + Math.sin(t * 1.2) * 60;
  drawSprite('PLAYER', px - 16, 290, false);

  ctx.textAlign = 'left';
}

function drawPauseScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 16px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W/2, H/2 - 10);
  ctx.fillStyle = '#0ff';
  ctx.font = '10px "Courier New"';
  ctx.fillText('PRESS SPACE TO RESUME', W/2, H/2 + 14);
  ctx.textAlign = 'left';
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#f00';
  ctx.font = 'bold 18px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2 - 30);
  ctx.fillStyle = '#ff0';
  ctx.font = '12px "Courier New"';
  ctx.fillText(`FINAL SCORE: ${player.score}`, W/2, H/2);
  ctx.fillStyle = '#0ff';
  ctx.font = '10px "Courier New"';
  ctx.fillText(`WAVE REACHED: ${wave}`, W/2, H/2 + 20);
  ctx.fillStyle = Math.floor(Date.now() / 500) % 2 ? '#fff' : '#0ff';
  ctx.font = 'bold 10px "Courier New"';
  ctx.fillText('PRESS ENTER TO TRY AGAIN', W/2, H/2 + 50);
  ctx.textAlign = 'left';
}

// ─────────────────────────────────────────────
//  GAME STATE MACHINE
// ─────────────────────────────────────────────
let gameState = 'title'; // 'title' | 'playing' | 'paused' | 'gameover'
let wasPaused = false;
let wasEnter = false;

function resetGame() {
  enemies.length = 0;
  bullets.length = 0;
  powerups.length = 0;
  explosions.length = 0;
  particles.length = 0;
  wave = 1;
  waveTimer = 0;
  spawnTimer = 1;
  spawnRate = 2.0;
  totalTime = 0;
  player.score = 0;
  player.lives = 3;
  player.firepower = 1;
  player.fuel = 100;
  player.hp = 3;
  player.active = true;
  player.invincible = 2.0;
  player.x = W/2; player.y = H - 80;
  player.dead = false;
}

// ─────────────────────────────────────────────
//  MAIN GAME LOOP
// ─────────────────────────────────────────────
let lastTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Input: ENTER
  const enterDown = keys['Enter'] || keys['NumpadEnter'];
  if (enterDown && !wasEnter) {
    if (gameState === 'title') { resetGame(); gameState = 'playing'; ensureAudio(); }
    else if (gameState === 'gameover') { resetGame(); gameState = 'playing'; }
  }
  wasEnter = enterDown;

  // Input: SPACE pause
  const spaceDown = keys['Space'];
  if (spaceDown && !wasPaused) {
    if (gameState === 'playing') gameState = 'paused';
    else if (gameState === 'paused') gameState = 'playing';
  }
  wasPaused = spaceDown;

  // ── TITLE
  if (gameState === 'title') {
    scrollOcean(dt);
    drawTitleScreen();
    return;
  }

  // ── GAME OVER
  if (gameState === 'gameover') {
    drawOcean();
    drawEnemies();
    drawParticles();
    drawGameOverScreen();
    return;
  }

  // ── PAUSED
  if (gameState === 'paused') {
    drawOcean();
    drawBullets();
    drawPowerups();
    drawEnemies();
    drawExplosions();
    drawParticles();
    drawPlayer();
    drawHUD();
    drawPauseScreen();
    return;
  }

  // ── PLAYING
  scrollOcean(dt);
  updatePlayer(dt);
  updateWave(dt);
  updateEnemies(dt, player);
  updateBullets(dt);
  updatePowerups(dt);
  updateExplosions(dt);
  updateParticles(dt);
  checkCollisions();

  // Draw
  drawOcean();
  drawPowerups();
  drawBullets();
  drawEnemies();
  drawExplosions();
  drawParticles();
  drawPlayer();
  drawHUD();

  // Screen flash
  if (flashAlpha > 0) {
    ctx.fillStyle = flashColor;
    ctx.globalAlpha = flashAlpha;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    flashAlpha = Math.max(0, flashAlpha - dt * 3);
  }
}

// ─────────────────────────────────────────────
//  SPRITE SHEET LOADER
//  Tries to load resources/sprites.jpg;
//  falls back to procedural sheet if empty/invalid.
// ─────────────────────────────────────────────
function initGame() {
  const img = new Image();
  img.onload = () => {
    // Validate: must have actual pixel data (width > 0)
    if (img.naturalWidth >= SPRITE_W && img.naturalHeight >= SPRITE_H) {
      sheet = document.createElement('canvas');
      sheet.width  = img.naturalWidth;
      sheet.height = img.naturalHeight;
      const sc = sheet.getContext('2d');
      sc.imageSmoothingEnabled = false;
      sc.drawImage(img, 0, 0);
      console.log(`Sprite sheet loaded: ${img.naturalWidth}×${img.naturalHeight}`);
    } else {
      console.warn('Sprite sheet invalid or empty — using procedural sprites.');
      sheet = buildProceduralSheet();
    }
    requestAnimationFrame(gameLoop);
  };
  img.onerror = () => {
    console.warn('Sprite sheet not found — using procedural sprites.');
    sheet = buildProceduralSheet();
    requestAnimationFrame(gameLoop);
  };
  img.src = 'resources/sprites.jpg';
}

initGame();
</script>
